<!DOCTYPE html><html lang="en"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEPTOPIA Portals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        /*
         * ═══════════════════════════════════════════════════════════════
         * PEPTOPIA UNIFIED THEME SYSTEM v1.0
         * ═══════════════════════════════════════════════════════════════
         *
         * COLOR HIERARCHY:
         * ────────────────
         * PRO-NURSE PORTAL:  Gold/Amber (#FFD700)     - Main hub, trophy items
         * NCLEX VAULT:       Pink/Magenta (#FF85E1)   - NCLEX branding
         * HESI VAULT:        Cyan/Teal (#00CCFF)      - HESI navigation
         *
         * CATEGORY COLORS (for future expansion):
         * ────────────────────────────────────────
         * MEDSURG:           Hot Pink (#FF69B4)
         * SPECIALTIES:       Coral (#FF7B7B)
         * LEADERSHIP:        Blue (#60A5FA)
         * GUIDES:            Lime Green (#00FF66)
         * BLITZ/SPEED:       Neon Yellow (#E6FF00)
         * ARENA:             Orange (#FFA500)
         * STREAM:            Purple (#8B5CF6)
         *
         * BASE PALETTE:
         * ─────────────
         * Background:        #0F172A (deep navy)
         * Card BG:           #1E293B (slate)
         * Text Primary:      #F1F5F9
         * Text Secondary:    #94A3B8
         * Text Muted:        #64748B
         *
         * ═══════════════════════════════════════════════════════════════
         */

        :root {
            /* Base Colors */
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: #334155;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-subtle: #475569;

            /* Portal Theme Colors */
            --gold: #FFD700;
            --gold-light: #FFE44D;
            --gold-glow: rgba(255, 215, 0, 0.4);

            --pink: #FF85E1;
            --pink-light: #FF9FE8;
            --pink-glow: rgba(255, 133, 225, 0.4);

            --cyan: #00CCFF;
            --cyan-light: #33D6FF;
            --cyan-glow: rgba(0, 204, 255, 0.4);

            /* Category Colors */
            --coral: #FF7B7B;
            --lime: #00FF66;
            --orange: #FFA500;
            --purple: #8B5CF6;
            --blue: #60A5FA;
            --hotpink: #FF69B4;
            --yellow: #E6FF00;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px 40px;
            overflow-x: hidden;
        }

        body.loaded {
            opacity: 1;
        }

        /* Animated Background - Purple/Pink/Blue gradient orbs */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(139, 92, 246, 0.12) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 75%, rgba(255, 133, 225, 0.08) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 204, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        /* ═══════════════════════════════════════════════════════════════
           LOGO SECTION
           ═══════════════════════════════════════════════════════════════ */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-image {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 25px rgba(139, 92, 246, 0.5));
            object-fit: cover;
            clip-path: circle(45% at center);
            animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
            }
            33% {
                filter: drop-shadow(0 0 30px rgba(255, 133, 225, 0.5));
            }
            66% {
                filter: drop-shadow(0 0 30px rgba(0, 204, 255, 0.5));
            }
        }

        /* Title Pill - Pink/White theme (matches PEPTOPIA branding) */
        .title-pill {
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--pink);
            box-shadow: 0 0 20px var(--pink-glow);
            margin-bottom: 12px;
        }

        .title-pill::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 133, 225, 0.3),
                transparent
            );
            transform: skewX(-20deg);
            animation: shimmer 3.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }

        .title-icon {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px var(--pink));
        }

        .title-text {
            color: #FFFFFF;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-style: italic;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ═══════════════════════════════════════════════════════════════
           PORTAL BUTTONS - Auto-width pills
           ═══════════════════════════════════════════════════════════════ */
        .portals-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* Base Portal Button - compact pill style */
        .portal-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            animation: slideInUp 0.5s ease-out both;
            white-space: nowrap;
        }

        .portal-btn:nth-child(1) { animation-delay: 0.15s; }
        .portal-btn:nth-child(2) { animation-delay: 0.25s; }
        .portal-btn:nth-child(3) { animation-delay: 0.35s; }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .portal-icon {
            font-size: 1.1rem;
        }

        .portal-text {
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
        }

        /* Hover shimmer effect */
        .portal-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.15),
                transparent
            );
            transition: left 0.5s ease;
        }

        .portal-btn:hover::before {
            left: 100%;
        }

        .portal-btn:active {
            transform: translateY(0) scale(0.97);
        }

        .portal-btn:focus {
            outline: none;
        }

        /* ─────────────────────────────────────────────────────────────────
           GOLD THEME - Pro-Nurse Portal
           ───────────────────────────────────────────────────────────────── */
        .portal-btn.theme-gold {
            border-color: var(--gold);
            color: #FFFFFF;
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .portal-btn.theme-gold:hover {
            background: rgba(255, 215, 0, 0.12);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px) scale(1.02);
            border-color: var(--gold-light);
        }

        .portal-btn.theme-gold .portal-icon {
            filter: drop-shadow(0 0 5px var(--gold));
        }

        /* ─────────────────────────────────────────────────────────────────
           PINK THEME - NCLEX Vault
           ───────────────────────────────────────────────────────────────── */
        .portal-btn.theme-pink {
            border-color: var(--pink);
            color: #FFFFFF;
            box-shadow: 0 0 12px var(--pink-glow);
        }

        .portal-btn.theme-pink:hover {
            background: rgba(255, 133, 225, 0.12);
            box-shadow: 0 0 20px rgba(255, 133, 225, 0.5), 0 0 40px rgba(255, 133, 225, 0.15);
            transform: translateY(-2px) scale(1.02);
            border-color: var(--pink-light);
        }

        .portal-btn.theme-pink .portal-icon {
            filter: drop-shadow(0 0 5px var(--pink));
        }

        /* ─────────────────────────────────────────────────────────────────
           CYAN THEME - HESI Vault
           ───────────────────────────────────────────────────────────────── */
        .portal-btn.theme-cyan {
            border-color: var(--cyan);
            color: #FFFFFF;
            box-shadow: 0 0 12px var(--cyan-glow);
        }

        .portal-btn.theme-cyan:hover {
            background: rgba(0, 204, 255, 0.12);
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.5), 0 0 40px rgba(0, 204, 255, 0.15);
            transform: translateY(-2px) scale(1.02);
            border-color: var(--cyan-light);
        }

        .portal-btn.theme-cyan .portal-icon {
            filter: drop-shadow(0 0 5px var(--cyan));
        }

        /* ═══════════════════════════════════════════════════════════════
           ADDITIONAL THEME COLORS (for future use)
           ═══════════════════════════════════════════════════════════════ */

        /* Coral Theme */
        .portal-btn.theme-coral {
            border-color: var(--coral);
            color: #FFFFFF;
            box-shadow: 0 0 12px rgba(255, 123, 123, 0.4);
        }
        .portal-btn.theme-coral:hover {
            background: rgba(255, 123, 123, 0.12);
            box-shadow: 0 0 20px rgba(255, 123, 123, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* Lime Theme */
        .portal-btn.theme-lime {
            border-color: var(--lime);
            color: #FFFFFF;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.4);
        }
        .portal-btn.theme-lime:hover {
            background: rgba(0, 255, 102, 0.12);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* Purple Theme */
        .portal-btn.theme-purple {
            border-color: var(--purple);
            color: #FFFFFF;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }
        .portal-btn.theme-purple:hover {
            background: rgba(139, 92, 246, 0.12);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* Blue Theme */
        .portal-btn.theme-blue {
            border-color: var(--blue);
            color: #FFFFFF;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.4);
        }
        .portal-btn.theme-blue:hover {
            background: rgba(96, 165, 250, 0.12);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* Orange Theme */
        .portal-btn.theme-orange {
            border-color: var(--orange);
            color: #FFFFFF;
            box-shadow: 0 0 12px rgba(255, 165, 0, 0.4);
        }
        .portal-btn.theme-orange:hover {
            background: rgba(255, 165, 0, 0.12);
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* ═══════════════════════════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════════════════════════ */
        .footer {
            margin-top: 45px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 133, 225, 0.2);
            text-align: center;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-style: italic;
            letter-spacing: 1px;
        }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE DESIGN
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 600px) {
            body {
                padding: 25px 15px 35px;
            }

            .logo-image {
                width: 130px;
                height: 130px;
            }

            .title-pill {
                padding: 8px 22px;
            }

            .title-icon {
                font-size: 1rem;
            }

            .title-text {
                font-size: 1.2rem;
                letter-spacing: 1.5px;
            }

            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 25px;
            }

            .portals-container {
                gap: 12px;
            }

            .portal-btn {
                padding: 11px 24px;
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            .portal-icon {
                font-size: 1rem;
            }
        }

        @media (max-width: 380px) {
            .title-text {
                font-size: 1.1rem;
            }

            .portal-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }

        /* Touch feedback for mobile */
        @media (hover: none) {
            .portal-btn:active {
                background: rgba(255, 255, 255, 0.08);
            }
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <div class="logo-container">
        <img src="https://pfst.cf2.poecdn.net/base/image/c8b93a44868ff23e8df8bb1f104b46aaf7c9b010e26f9eb913e0307b14df4e9e?w=750&amp;h=750" alt="PEPTOPIA Logo" class="logo-image">
        <div class="title-pill">
            <span class="title-icon">🏆</span>

            <span class="title-icon">🏆</span>
        </div>
        <p class="subtitle">Select a vault to begin your journey</p>
    </div>

    <!-- Portal Buttons -->
    <div class="portals-container">
        <a href="https://poe.com/preview/Y3CMoI0sBtGYIrFhLHjO" target="_blank" class="portal-btn theme-gold">
            <span class="portal-icon">🏆</span>

        </a>

    <!-- Footer -->
    <div class="footer">
        <p class="footer-text">PEPTOPIA • Nursing Excellence</p>
    </div>

    <script>
        // Fade in on load
        document.addEventListener('DOMContentLoaded', function() {
            document.body.classList.add('loaded');
        });

        // Fallback for immediate load
        if (document.readyState === 'complete') {
            document.body.classList.add('loaded');
        }
    </script>



</body></html>
