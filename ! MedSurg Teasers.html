            "C. Increase the dose as these are signs of subtherapeutic levels.",
            "D. Encourage increased fluid intake to dilute the medication."
        ],
        "c": "B",
        "r": "Nystagmus (involuntary eye movement) and ataxia (uncoordinated movement) are classic signs of **Phenytoin toxicity**. The nurse must **hold** the medication and notify the provider. Continuing or increasing the dose could worsen toxicity.",
        "type": "single"
    },
    "q18": {
        "section": "NURSING PROCESS",
        "topic": "Pain Assessment Scales",
        "question": "When assessing pain in an adult client who is alert and oriented, which pain assessment tool is most appropriate?",
        "options": [
            "A. FLACC scale.",
            "B. Wong-Baker FACES scale.",
            "C. Numerical rating scale (0-10).",
            "D. CRIES scale."
        ],
        "c": "C",
        "r": "For an alert and oriented adult, the **numerical rating scale (0-10)** is the most appropriate and commonly used tool. FLACC and CRIES are for nonverbal/pediatric populations. Wong-Baker FACES can be used for adults but is often preferred for children or those with communication barriers.",
        "type": "single"
    },
    "q19": {
        "section": "HEMATOLOGY",
        "topic": "Russell's Traction",
        "question": "A client is placed in Russell's traction for a femur fracture. Which nursing assessment is the priority?",
        "options": [
            "A. Monitoring for skin breakdown on the sacrum.",
            "B. Assessing for signs of neurovascular compromise in the affected extremity.",
            "C. Ensuring the client's head is elevated at 90 degrees.",
            "D. Checking the client's dietary intake."
        ],
        "c": "B",
        "r": "The **priority** in any traction is assessing for **neurovascular compromise** (circulation, sensation, movement) in the affected extremity. This includes checking pulses, color, temperature, sensation, and capillary refill. Skin breakdown is also a concern but is secondary to neurovascular status.",
        "type": "single"
    },
    "q20": {
        "section": "NEUROLOGY",
        "topic": "Romberg's Test",
        "question": "A positive Romberg's test, where the client sways or loses balance when standing with eyes closed, indicates a problem with:",
        "options": [
            "A. Cerebellar function.",
            "B. Proprioception or vestibular function.",
            "C. Motor cortex function.",
            "D. Visual acuity."
        ],
        "c": "B",
        "r": "**Romberg's test** assesses proprioception (sense of body position) and vestibular function. A positive test (swaying/falling with eyes closed) indicates the client is relying on vision to compensate for deficits in these sensory systems.",
        "type": "single"
    },
    "q21": {
        "section": "PAIN MANAGEMENT",
        "topic": "Gate Control Theory",
        "question": "The Gate Control Theory of pain suggests that non-painful input can close 'gates' in the spinal cord to painful input. Which nursing intervention is based on this theory?",
        "options": [
            "A. Administering opioid analgesics.",
            "B. Applying a cold pack or massage to a painful area.",
            "C. Positioning the client for comfort.",
            "D. Providing distraction techniques."
        ],
        "c": "B",
        "r": "The **Gate Control Theory** (Melzack & Wall) proposes that stimulating large nerve fibers (like those sensing touch, pressure, or temperature via cold/massage) can 'close the gate' to pain signals from smaller fibers, reducing pain perception. Applying a cold pack or massage directly stimulates these fibers.",
        "type": "single"
    },
    "q22": {
        "section": "NEUROLOGY",
        "topic": "Referred Pain",
        "question": "A client experiencing a myocardial infarction (MI) reports pain radiating to the left arm and jaw. This type of pain is best described as:",
        "options": [
            "A. Phantom pain.",
            "B. Neuropathic pain.",
            "C. Referred pain.",
            "D. Somatic pain."
        ],
        "c": "C",
        "r": "**Referred pain** is pain perceived at a location other than the site of the painful stimulus. In an MI, pain originates in the heart but is felt in the left arm, jaw, or back due to shared nerve pathways entering the spinal cord.",
        "type": "single"
    },
    "q23": {
        "section": "PHARMACOLOGY",
        "topic": "Opioid Overdose",
        "question": "A client admitted for opioid overdose is found with pinpoint pupils, a respiratory rate of 6 breaths/min, and altered level of consciousness. The nurse's priority intervention is to:",
        "options": [
            "A. Administer Naloxone (Narcan) as prescribed.",
            "B. Initiate CPR immediately.",
            "C. Position the client in Trendelenburg.",
            "D. Obtain a urine drug screen."
        ],
        "c": "A",
        "r": "The classic triad of opioid overdose is miosis (pinpoint pupils), respiratory depression, and **altered LOC**. The priority is to reverse the opioid effect with **Naloxone (Narcan)**, which is an opioid antagonist. CPR is for cardiac arrest, not respiratory depression.",
        "type": "single"
    },
    "q24": {
        "section": "GERIATRIC NUTRITION",
        "topic": "Aspiration Prevention",
        "question": "When administering tube feedings to a client at risk for aspiration, the nurse should prioritize which action?",
        "options": [
            "A. Position the client flat to promote gastric emptying.",
            "B. Administer the feeding as a rapid bolus.",
            "C. Elevate the head of the bed to at least 30-45 degrees.",
            "D. Verify tube placement by injecting air and listening over the stomach."
        ],
        "c": "C",
        "r": "To prevent aspiration, the client's **head of bed (HOB) should be elevated at least 30-45 degrees** during and for 30-60 minutes after feedings. This uses gravity to keep stomach contents down. X-ray is the gold standard for initial tube placement verification, not auscultation.",
        "type": "single"
    },
    "q25": {
        "section": "RESPIRATORY",
        "topic": "Hypoxemia",
        "question": "A client's arterial blood gas (ABG) results show a PaO₂ of 55 mmHg. The nurse interprets this as:",
        "options": [
            "A. Normal oxygenation.",
            "B. Hypoxemia (low oxygen in the blood).",
            "C. Hyperoxemia (high oxygen in the blood).",
            "D. Metabolic acidosis."
        ],
        "c": "B",
        "r": "Normal **PaO₂** is 80-100 mmHg. A PaO₂ of 55 mmHg is significantly below normal, indicating **hypoxemia** (low oxygen in arterial blood). Hypoxemia can lead to tissue hypoxia if not corrected.",
        "type": "single"
    },
    "q26": {
        "section": "RESPIRATORY",
        "topic": "Status Asthmaticus",
        "question": "A client with asthma is admitted in status asthmaticus. Which finding indicates the client's condition is worsening?",
        "options": [
            "A. Loud, audible wheezing.",
            "B. Silent chest (absence of wheezing).",
            "C. Productive cough with yellow sputum.",
            "D. Respiratory rate of 22 breaths/min."
        ],
        "c": "B",
        "r": "A **silent chest** in an asthmatic client is an ominous sign. It indicates such severe bronchoconstriction that there is minimal to no air movement, and therefore no wheezing. This is a medical emergency requiring immediate intervention.",
        "type": "single"
    },
    "q27": {
        "section": "POST-OPERATIVE CARE",
        "topic": "Coughing Position",
        "question": "After abdominal surgery, a client is reluctant to cough due to incisional pain. Which position should the nurse encourage for effective coughing?",
        "options": [
            "A. Supine with legs elevated.",
            "B. Prone position.",
            "C. Sitting upright or in a side-lying position, splinting the incision.",
            "D. Trendelenburg position."
        ],
        "c": "C",
        "r": "**Sitting upright** allows for maximum lung expansion. Encouraging the client to **splint** the incision (using a pillow or hands) provides support and reduces pain during coughing, making the cough more effective.",
        "type": "single"
    },
    "q28": {
        "section": "OPHTHALMOLOGY",
        "topic": "Degenerative Changes",
        "question": "The nurse is teaching a client about age-related degenerative changes in the eye. Which statement indicates a need for further teaching?",
        "options": [
            "A. 'The lens may become less flexible, making it harder to focus on close objects.'",
            "B. 'Peripheral vision may decrease slightly with age.'",
            "C. 'I can expect my night vision to improve as I get older.'",
            "D. 'The pupil may react more slowly to changes in light.'"
        ],
        "c": "C",
        "r": "Age-related changes typically include decreased lens flexibility (presbyopia), some loss of peripheral vision, slower pupil reaction, and notably, **decreased night vision** (not improved) due to changes in the pupil and retina. Statement C requires further teaching.",
        "type": "single"
    },
    "q29": {
        "section": "OPHTHALMOLOGY",
        "topic": "Chronic Open-Angle Glaucoma",
        "question": "A client diagnosed with Chronic Open-Angle Glaucoma (COAG) asks the nurse about the disease. Which statement by the nurse is most accurate?",
        "options": [
            "A. 'COAG causes a sudden, painful increase in eye pressure.'",
            "B. 'COAG is characterized by a gradual, painless loss of peripheral vision.'",
            "C. 'COAG is easily cured with antibiotic eye drops.'",
            "D. 'COAG only affects one eye at a time.'"
        ],
        "c": "B",
        "r": "**Chronic Open-Angle Glaucoma (COAG)** is the most common form and is characterized by a slow, **painless** increase in intraocular pressure (IOP), leading to gradual **peripheral vision loss** (tunnel vision). It often affects both eyes and requires lifelong management, not a cure.",
        "type": "single"
    },
    "q30": {
        "section": "PHARMACOLOGY",
        "topic": "Beta-Agonists (SABA)",
        "question": "A client with asthma is prescribed Albuterol (Proventil HFA). The nurse teaches the client that this medication acts as a:",
        "options": [
            "A. Bronchodilator by relaxing airway smooth muscle.",
            "B. Corticosteroid that reduces airway inflammation.",
            "C. Anticholinergic that blocks parasympathetic nerve signals.",
            "D. Leukotriene modifier that prevents allergic reactions."
        ],
        "c": "A",
        "r": "**Albuterol** is a short-acting beta-2 agonist (**SABA**) that causes **bronchodilation** by relaxing the smooth muscles of the airways. It is a rescue inhaler used for quick relief of acute bronchospasm.",
        "type": "single"
    },
    "q31": {
        "section": "OPHTHALMOLOGY",
        "topic": "Miotics",
        "question": "A client with glaucoma is prescribed Pilocarpine (Isopto Carpine). The nurse explains that this medication works by:",
        "options": [
            "A. Dilating the pupil to allow more light into the eye.",
            "B. Reducing aqueous humor production.",
            "C. Constricting the pupil (miosis) to improve aqueous humor outflow.",
            "D. Paralyzing the ciliary muscle for examination."
        ],
        "c": "C",
        "r": "**Pilocarpine** is a miotic (cholinergic) agent. It causes **pupil constriction (miosis)**, which pulls the iris away from the trabecular meshwork, opening it up and improving the outflow of aqueous humor, thereby reducing intraocular pressure (IOP).",
        "type": "single"
    },
    "q32": {
        "section": "OPHTHALMOLOGY",
        "topic": "Pterygium",
        "question": "A client presents with a fleshy, triangular growth of tissue on the conjunctiva extending onto the cornea. The nurse recognizes this as:",
        "options": [
            "A. Cataract.",
            "B. Pterygium.",
            "C. Chalazion.",
            "D. Stye (Hordeolum)."
        ],
        "c": "B",
        "r": "A **Pterygium** is a benign, wing-shaped (triangular) growth of fleshy tissue on the conjunctiva that can extend onto the cornea. It is often associated with sun (UV) exposure. If it grows large enough to cover the pupil, it can impair vision.",
        "type": "single"
    },
    "q33": {
        "section": "OPHTHALMOLOGY",
        "topic": "Blurring of Vision",
        "question": "A client reports gradual, painless blurring of vision, difficulty with night driving, and seeing halos around lights. The nurse suspects:",
        "options": [
            "A. Acute Angle-Closure Glaucoma.",
            "B. Cataract.",
            "C. Retinal Detachment.",
            "D. Macular Degeneration."
        ],
        "c": "B",
        "r": "These are classic symptoms of a **cataract**: gradual, **painless** clouding of the lens leading to blurred vision, difficulty with night vision (glare), and halos around lights. Acute angle-closure glaucoma is sudden and painful.",
        "type": "single"
    },
    "q34": {
        "section": "IMMUNE & HEMATOLOGY",
        "topic": "Iron Deficiency Signs",
        "question": "A nurse is assessing a client suspected of having iron deficiency anemia. Which findings are most consistent with this diagnosis? (Select All That Apply)",
        "options": [
            "A. Brittle, spoon-shaped nails (koilonychia).",

            "D. Pica (craving for non-food substances like ice or dirt).",

        "c": "ABD",
        "r": "Signs of iron deficiency anemia include **Brittle nails/koilonychia (A)**, **Glossitis (B)**, and **Pica (D)**. Jaundice (C) is more associated with hemolytic anemia or liver disease. Petechiae (E) are related to platelet disorders, not iron deficiency.",
        "type": "sata"
    },
    "q35": {
        "section": "OPHTHALMOLOGY",
        "topic": "Iridectomy",
        "question": "A client with acute angle-closure glaucoma undergoes a peripheral iridectomy. The nurse explains that the purpose of this procedure is to:",
        "options": [
            "A. Remove the entire iris to reduce intraocular pressure.",
            "B. Create a small hole in the iris to allow aqueous humor to flow more freely.",
            "C. Implant a new lens to restore vision.",
            "D. Laser the trabecular meshwork to increase outflow."
        ],
        "c": "B",
        "r": "A **peripheral iridectomy** (or laser iridotomy) creates a small opening in the peripheral iris. This allows aqueous humor to bypass a potential pupillary block and flow directly from the posterior chamber to the anterior chamber and out through the trabecular meshwork.",
        "type": "single"
    },
    "q36": {
        "section": "OPHTHALMOLOGY",
        "topic": "Enucleation",
        "question": "A client is scheduled for enucleation of the left eye due to a malignant tumor. The nurse provides preoperative teaching, emphasizing that enucleation involves:",
        "options": [
            "A. Removal of the eyeball contents, leaving the scleral shell.",
            "B. Complete removal of the eyeball.",
            "C. Removal of the eyeball and all orbital contents.",
            "D. Partial removal of the iris and lens."
        ],
        "c": "B",
        "r": "**Enucleation** is the surgical **removal of the entire eyeball**, leaving the orbital muscles and other orbital contents intact. This is distinguished from evisceration (contents only) and exenteration (entire orbit).",
        "type": "single"
    },
    "q37": {
        "section": "ELECTROLYTES",
        "topic": "Hypocalcemia Signs",
        "question": "A nurse is assessing a client with suspected hypocalcemia. Which assessment findings would confirm this? (Select All That Apply)",
        "options": [
            "A. Positive Chvostek's sign (facial twitching when cheek is tapped).",

            "C. Hyperactive deep tendon reflexes.",
            "D. Flaccid muscles and decreased reflexes.",
            "E. Prolonged QT interval on ECG."
        ],
        "c": "ABCE",
        "r": "**Hypocalcemia** causes increased neuromuscular excitability. **Chvostek's (A)**, **Trousseau's (B)**, **hyperactive reflexes (C)**, and a **prolonged QT interval (E)** are all signs. Flaccid muscles (D) would be seen in hypercalcemia.",
        "type": "sata"
    },
    "q38": {
        "section": "HEPATIC & GI",
        "topic": "Hepatotoxicity",
        "question": "A client is taking a medication known for hepatotoxicity. Which lab values should the nurse monitor most closely?",

            "A. BUN and Creatinine.",
            "B. ALT and AST.",
            "C. Hemoglobin and Hematocrit.",

    },
    "q39": {
        "section": "NEUROLOGY",
        "topic": "Paresthesias",
        "question": "A client reports experiencing paresthesias (tingling, numbness) in their hands and feet. The nurse recognizes that this could be a sign of:",

            "D. Pulmonary embolism."
        ],

        "r": "**Paresthesias** in a 'glove and stocking' distribution (hands and feet) are classic signs of **peripheral neuropathy**, which can be caused by diabetes, B12 deficiency, chemotherapy, or other conditions affecting peripheral nerves.",

    },
    "q40": {
        "section": "HEMATOLOGY",
        "topic": "Gate-Control Theory Application",
        "question": "Based on the gate-control theory of pain, which nursing intervention would be most effective in reducing a client's perception of post-operative pain?",
        "options": [
            "A. Administering a prescribed opioid analgesic.",

        "c": "B",

    },
    "q41": {

    "q42": {

        "topic": "Peritonitis",

    "q43": {
        "section": "RESPIRATORY",
        "topic": "Airway Priority",
        "question": "A nurse is caring for a client who has just been admitted after a near-drowning incident. The client is unresponsive. What is the nurse's FIRST priority action?",

    },
    "q44": {
        "section": "IMMUNE & HEMATOLOGY",
        "topic": "Glasgow Coma Scale",
        "question": "A nurse assesses a client's Glasgow Coma Scale (GCS). The client opens eyes to painful stimuli (E2), makes incomprehensible sounds (V2), and exhibits abnormal flexion (decorticate posturing) to pain (M3). What is the client's GCS score?",

            "A. 5",
            "B. 7",
            "C. 9",
            "D. 11"
        ],

        "r": "GCS is calculated: Eyes (E) + Verbal (V) + Motor (M). E2 (pain) + V2 (incomprehensible sounds) + M3 (abnormal flexion) = **7**. A GCS of 8 or below indicates severe brain injury and often the need for intubation.",
        "type": "single"
    },
    "q45": {

        "topic": "Snellen's Test",

    },
    "q46": {
        "section": "HEPATIC & GI",
        "topic": "Hypotonic Enema",
        "question": "A nurse is preparing to administer a hypotonic (tap water) enema. The nurse understands that a potential complication of this type of enema is:",

            "B. Water intoxication due to fluid absorption.",
            "C. Hypernatremia due to sodium absorption.",
            "D. Constipation."
        ],
        "c": "B",
        "r": "A **hypotonic enema** (tap water) has a lower solute concentration than body fluids. This can cause water to be **absorbed** into the bloodstream, potentially leading to **water intoxication** (fluid overload, hyponatremia, seizures). Hypertonic enemas draw fluid out.",

    },
    "q47": {
        "section": "IMMUNE & HEMATOLOGY",
        "topic": "Cushing's Response",
        "question": "A client with a severe head injury begins exhibiting Cushing's Triad. The nurse recognizes this as:",
        "options": [
            "A. Hypotension, tachycardia, and irregular respirations.",
            "B. Hypertension, bradycardia, and widened pulse pressure.",
            "C. Fever, tachycardia, and hypertension.",
            "D. Hypotension, hypothermia, and shallow respirations."
        ],
        "c": "B",
        "r": "**Cushing's Triad** (or Cushing's Response) is a late sign of increased intracranial pressure (ICP). It consists of **Hypertension** (with a **widened pulse pressure**), **Bradycardia**, and **irregular respirations** (often Cheyne-Stokes). It's an ominous sign indicating brainstem compression.",

    },

    "q51": {

    },
    "q52": {

        oscillator.connect(gainNode);

        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

    } catch (error) {

}

function formatQuestionText(questionText) {
    // Patterns that indicate the start of the actual question
    const questionPatterns = [
        /\b(Which\s+(?:of the following\s+)?(?:action|intervention|statement|assessment|finding|response|priority|nursing|laboratory|symptom|sign|medication|instruction|teaching|is\b|should|would|does|do|are|best|most|indicates|is most|is the|is a\b))/i,
        /\b(What\s+(?:is|are|does|would|should|action|priority|finding|intervention))/i,
        /\b(The\s+nurse\s+(?:should|would|understands?|knows?|recognizes?|prioritizes?|interprets?|anticipates?|suspects?|includes?))/i,
        /\b(True\s+or\s+False:)/i,
        /\b(Select\s+[Aa]ll\s+[Tt]hat\s+[Aa]pply)/i,
        /\b(In\s+what\s+order\s+should)/i,
        /\b(How\s+should\s+the\s+nurse)/i,
        /\b(The\s+(?:primary|priority|most\s+important|immediate|best|appropriate)\s+(?:action|intervention|response|nursing))/i
    ];

    for (const pattern of questionPatterns) {
        const match = questionText.match(pattern);
        if (match && match.index > 10) {
            const background = questionText.substring(0, match.index).trim();
            const prompt = questionText.substring(match.index).trim();
            return `<span class="question-background">${background}</span><span class="question-prompt">${prompt}</span>`;
        }
    }

    // Fallback: look for the last sentence that ends with ? or :
    const lastQuestionMatch = questionText.match(/^(.+?[.!])\s+([^.!]+[?:])$/s);
    if (lastQuestionMatch) {
        return `<span class="question-background">${lastQuestionMatch[1].trim()}</span><span class="question-prompt">${lastQuestionMatch[2].trim()}</span>`;
    }

    // If no split found, return as single prompt
    return `<span class="question-prompt">${questionText}</span>`;
}

                isDisabled = 'style="pointer-events: none; cursor: default;"';
const isSelected = retestState.selected.includes(optionLetter);
const isCorrectOption = qData.c.includes(optionLetter);
                if (isSelected && isCorrectOption) { optionClasses += ' correct-feedback-background'; }
                else if (isSelected && !isCorrectOption) { optionClasses += ' incorrect-feedback-background'; }
                else if (!isSelected && isCorrectOption) { optionClasses += ' correct-feedback-background'; }
            }

            return `<li class="${optionClasses}" data-q="${qid}" data-a="${optionLetter}" data-retest="${isRetest}" ${isDisabled}><span class="answer-option-letter">${optionLetter}</span>${displayOptionText}</li>`;
        }).join('');
    }

    const listTag = isSequence ? 'div' : 'ol type="A"';
const listClose = isSequence ? 'div' : 'ol';

    html += `
        <div class="section-block pastel-${(qData.displayNum % 6) + 1}" data-qid="${qid}" data-answered="${isAlreadyAnsweredInRetest ? 'true' : 'false'}" data-retest="${isRetest}">
            ${questionNumberDisplay}${questionNumberDisplay ? ' ' : ''}<p class="question-text">${formatQuestionText(qData.question)}</p>
            <${listTag}>${optionsHtml}</${listClose}>
            ${isAlreadyAnsweredInRetest ? '' : checkButtonHtml}
            <div class="answer-feedback" id="feedback-${qid}${isRetest ? '-retest' : ''}" style="${isAlreadyAnsweredInRetest ? 'display:block;' : 'display:none;'}">
                <div><span id="cs-${qid}${isRetest ? '-retest' : ''}"></span><span id="ca-${qid}${isRetest ? '-retest' : ''}"></span></div>
                <div style="margin-top: 5px;"><span class="rationale-label"><b>Rationale:</b></span></div>
                <div id="r-${qid}${isRetest ? '-retest' : ''}" style="margin-top: 3px;"></div>
            </div>
        </div>
    `;
    return html;
}

function handleSequenceClick(element, qid, isRetest) {
    const sectionBlock = element.closest('.section-block');
const itemNumber = parseInt(element.dataset.item);

    if (!sequenceSelectionMap.has(qid)) {
        sequenceSelectionMap.set(qid, []);
    }
    const currentSequence = sequenceSelectionMap.get(qid);
const indexInSequence = currentSequence.indexOf(itemNumber);

    if (indexInSequence !== -1) {
        currentSequence.splice(indexInSequence);
    } else {
        currentSequence.push(itemNumber);
    }

    const allItems = sectionBlock.querySelectorAll('.sequence-item');
    allItems.forEach(item => {
        const itemNum = parseInt(item.dataset.item);
const posInSeq = currentSequence.indexOf(itemNum);
const seqNumSpan = item.querySelector('.answer-option-sequence-num');

        if (posInSeq !== -1) {
            item.classList.add('sequenced');
            if (seqNumSpan) {
                seqNumSpan.textContent = posInSeq + 1;
            } else {
                const newSpan = document.createElement('span');
                newSpan.className = 'answer-option-sequence-num';
                newSpan.textContent = posInSeq + 1;
                item.insertBefore(newSpan, item.firstChild);
            }
        } else {
            item.classList.remove('sequenced');
            if (seqNumSpan) {
                seqNumSpan.remove();
            }
        }
    });
}

function checkSequenceAnswer(qid, isRetest) {
    const qData = qd[qid];
const currentSequence = sequenceSelectionMap.get(qid) || [];
const correctSequenceStr = qData.c;
const correctMatch = correctSequenceStr.match(/(\d+),\s*(\d+),\s*(\d+),\s*(\d+)/);

    if (!correctMatch) {
        console.error('Could not parse correct sequence for', qid);
        return;
    }

    const correctSequence = [
        parseInt(correctMatch[1]),
        parseInt(correctMatch[2]),
        parseInt(correctMatch[3]),
        parseInt(correctMatch[4])
    ];
const isCorrect = currentSequence.length === correctSequence.length &&
        currentSequence.every((val, idx) => val === correctSequence[idx]);
const feedbackId = isRetest ? `feedback-${qid}-retest` : `feedback-${qid}`;
const csId = isRetest ? `cs-${qid}-retest` : `cs-${qid}`;
const caId = isRetest ? `ca-${qid}-retest` : `ca-${qid}`;
const rId = isRetest ? `r-${qid}-retest` : `r-${qid}`;
const feedbackDiv = document.getElementById(feedbackId);
const csSpan = document.getElementById(csId);
const caSpan = document.getElementById(caId);
const rDiv = document.getElementById(rId);

    if (isCorrect) {
        feedbackDiv.classList.add('correct-feedback-container');
        csSpan.innerHTML = '<span class="correct-answer-label"><span class="feedback-emoticon">✅</span> CORRECT!</span> ';
        playCorrectSound();
    } else {
        feedbackDiv.classList.remove('correct-feedback-container');
        csSpan.innerHTML = '<span class="incorrect-feedback-label"><span class="feedback-emoticon">❌</span> INCORRECT</span> ';
    }

    caSpan.innerHTML = `<span class="correct-letter-highlight">Correct Order: ${correctSequence.join(', ')}</span>`;
    rDiv.innerHTML = processRationale(qid, qData.r, isCorrect);
    feedbackDiv.style.display = 'block';
const sectionBlock = feedbackDiv.closest('.section-block');
    sectionBlock.querySelectorAll('.sequence-item').forEach(item => {
        item.style.pointerEvents = 'none';
        item.style.cursor = 'default';
    });
const checkBtn = sectionBlock.querySelector('.check-sata-button');
    if (checkBtn) checkBtn.style.display = 'none';

    if (isRetest) {
        retestQuestionStates.set(qid, {
            answered: true,
            wasCorrect: isCorrect,
            selectedSequence: [...currentSequence]
        });
        if (isCorrect) retestCorrect++;
        else retestIncorrect++;
        document.getElementById('retest-cc').textContent = retestCorrect;
        document.getElementById('retest-ic').textContent = retestIncorrect;
        document.getElementById('retest-score-summary').style.display = 'block';
    } else {
        answeredQuestions.add(qid);
        if (isCorrect) cc++;
        else { ic++; missedQuestions.add(qid); }
        updateScore();
    }
}

function handleSingleAnswer(element, qid, isRetest) {
    const qData = qd[qid];
const selectedAnswer = element.dataset.a;
const isCorrect = selectedAnswer === qData.c;
const feedbackId = isRetest ? `feedback-${qid}-retest` : `feedback-${qid}`;
const csId = isRetest ? `cs-${qid}-retest` : `cs-${qid}`;
const caId = isRetest ? `ca-${qid}-retest` : `ca-${qid}`;
const rId = isRetest ? `r-${qid}-retest` : `r-${qid}`;
const feedbackDiv = document.getElementById(feedbackId);
const csSpan = document.getElementById(csId);
const caSpan = document.getElementById(caId);
const rDiv = document.getElementById(rId);

    element.classList.add(isCorrect ? 'correct-feedback-background' : 'incorrect-feedback-background');
const sectionBlock = element.closest('.section-block');
    sectionBlock.querySelectorAll('.answer-option').forEach(opt => {
        opt.style.pointerEvents = 'none';
        opt.style.cursor = 'default';
        if (opt.dataset.a === qData.c && !isCorrect) {
            opt.classList.add('correct-feedback-background');
        }
    });

    if (isCorrect) {
        feedbackDiv.classList.add('correct-feedback-container');
        csSpan.innerHTML = '<span class="correct-answer-label"><span class="feedback-emoticon">✅</span> CORRECT!</span> ';
        playCorrectSound();
    } else {
        feedbackDiv.classList.remove('correct-feedback-container');
        csSpan.innerHTML = '<span class="incorrect-feedback-label"><span class="feedback-emoticon">❌</span> INCORRECT</span> ';
    }

    caSpan.innerHTML = `<span class="correct-letter-highlight">Answer: ${qData.c}</span>`;
    rDiv.innerHTML = processRationale(qid, qData.r, isCorrect);
    feedbackDiv.style.display = 'block';

    if (isRetest) {
        retestQuestionStates.set(qid, { answered: true, wasCorrect: isCorrect, selected: [selectedAnswer] });
        if (isCorrect) retestCorrect++;
        else retestIncorrect++;
        document.getElementById('retest-cc').textContent = retestCorrect;
        document.getElementById('retest-ic').textContent = retestIncorrect;
        document.getElementById('retest-score-summary').style.display = 'block';
    } else {
        answeredQuestions.add(qid);
        if (isCorrect) cc++;
        else { ic++; missedQuestions.add(qid); }
        updateScore();
    }
}

function handleSATACheck(qid, isRetest) {
    const qData = qd[qid];
const sectionBlock = document.querySelector(`.section-block[data-qid="${qid}"][data-retest="${isRetest}"]`);
const selectedOptions = sectionBlock.querySelectorAll('.answer-option.selected');
const selectedLetters = Array.from(selectedOptions).map(opt => opt.dataset.a).sort().join('');
const correctLetters = qData.c.split('').sort().join('');
const isCorrect = selectedLetters === correctLetters;
const feedbackId = isRetest ? `feedback-${qid}-retest` : `feedback-${qid}`;
const csId = isRetest ? `cs-${qid}-retest` : `cs-${qid}`;
const caId = isRetest ? `ca-${qid}-retest` : `ca-${qid}`;
const rId = isRetest ? `r-${qid}-retest` : `r-${qid}`;
const feedbackDiv = document.getElementById(feedbackId);
const csSpan = document.getElementById(csId);
const caSpan = document.getElementById(caId);
const rDiv = document.getElementById(rId);

    sectionBlock.querySelectorAll('.answer-option').forEach(opt => {
        opt.style.pointerEvents = 'none';
        opt.style.cursor = 'default';
const letter = opt.dataset.a;
const isSelected = opt.classList.contains('selected');
const isCorrectOption = qData.c.includes(letter);

        if (isSelected && isCorrectOption) opt.classList.add('correct-feedback-background');
        else if (isSelected && !isCorrectOption) opt.classList.add('incorrect-feedback-background');
        else if (!isSelected && isCorrectOption) opt.classList.add('correct-feedback-background');
    });
const checkBtn = sectionBlock.querySelector('.check-sata-button');
    if (checkBtn) checkBtn.style.display = 'none';

    if (isCorrect) {
        feedbackDiv.classList.add('correct-feedback-container');
        csSpan.innerHTML = '<span class="correct-answer-label"><span class="feedback-emoticon">✅</span> CORRECT!</span> ';
        playCorrectSound();
    } else {
        feedbackDiv.classList.remove('correct-feedback-container');
        csSpan.innerHTML = '<span class="incorrect-feedback-label"><span class="feedback-emoticon">❌</span> INCORRECT</span> ';
    }

    caSpan.innerHTML = `<span class="correct-letter-highlight">Correct: ${qData.c.split('').join(', ')}</span>`;
    rDiv.innerHTML = processRationale(qid, qData.r, isCorrect);
    feedbackDiv.style.display = 'block';

    if (isRetest) {
        retestQuestionStates.set(qid, { answered: true, wasCorrect: isCorrect, selected: selectedLetters.split('') });
        if (isCorrect) retestCorrect++;
        else retestIncorrect++;
        document.getElementById('retest-cc').textContent = retestCorrect;
        document.getElementById('retest-ic').textContent = retestIncorrect;
        document.getElementById('retest-score-summary').style.display = 'block';
    } else {
        answeredQuestions.add(qid);
        if (isCorrect) cc++;
        else { ic++; missedQuestions.add(qid); }
        updateScore();
    }
}

function updateScore() {
    document.getElementById('cc').textContent = cc;
    document.getElementById('ic').textContent = ic;
const grade = answeredQuestions.size > 0 ? Math.round((cc / answeredQuestions.size) * 100) : 0;
const gradeEl = document.getElementById('gp');
    gradeEl.textContent = grade + '%';
    gradeEl.parentElement.classList.toggle('failing', grade < 70);

    if (answeredQuestions.size === tq && missedQuestions.size > 0) {
        populateRetestSection();
    }
}

function populateRetestSection() {
    const retestArea = document.getElementById('retest-questions-display-area');
    retestArea.innerHTML = '';
    missedQuestions.forEach(qid => {
        const qData = qd[qid];
        retestArea.innerHTML += generateQuestionHtml(qid, qData, true);
    });
    attachEventListeners(true);
}

function attachEventListeners(retestOnly = false) {
    const scope = retestOnly ? document.getElementById('retest-questions-display-area') : document;

    scope.querySelectorAll('.answer-option:not(.sequence-item)').forEach(opt => {
        opt.addEventListener('click', function() {
            if (this.style.pointerEvents === 'none') return;
const qid = this.dataset.q;
const qData = qd[qid];
const isRetest = this.dataset.retest === 'true';

            if (qData.type === 'sata') {
                this.classList.toggle('selected');
            } else {
                handleSingleAnswer(this, qid, isRetest);
            }
        });
    });

    scope.querySelectorAll('.sequence-item').forEach(item => {
        item.addEventListener('click', function() {
            if (this.style.pointerEvents === 'none') return;
const qid = this.dataset.q;
const isRetest = this.dataset.retest === 'true';
            handleSequenceClick(this, qid, isRetest);
        });
    });

    scope.querySelectorAll('.check-sata-button').forEach(btn => {
        btn.addEventListener('click', function() {
            const qid = this.dataset.q;
const qData = qd[qid];
const isRetest = this.dataset.retest === 'true';

            if (qData.type === 'sequence') {
                checkSequenceAnswer(qid, isRetest);
            } else {
                handleSATACheck(qid, isRetest);
            }
        });
    });
}

function initQuiz() {
    const displayArea = document.getElementById('questions-display-area');
    
    // Section mapping to consolidate related topics
    const sectionMapping = {
        "IMMUNE & HEMATOLOGY": "IMMUNE SYSTEM & HEMATOLOGY",
        "HEMATOLOGY": "IMMUNE SYSTEM & HEMATOLOGY",
        "ELECTROLYTES": "FLUID, ELECTROLYTES & ACID-BASE",
        "HEPATIC & GI": "GASTROINTESTINAL & HEPATIC",
        "NEUROLOGY": "NEUROLOGICAL",
        "NURSING ETHICS": "NURSING FUNDAMENTALS",
        "NURSING PROCESS": "NURSING FUNDAMENTALS",
        "NUTRITION": "NUTRITION",
        "GERIATRIC NUTRITION": "NUTRITION",
        "ONCOLOGY": "ONCOLOGY",
        "OPHTHALMOLOGY": "SENSORY: EYES & VISION",
        "PAIN MANAGEMENT": "PAIN MANAGEMENT",
        "PHARMACOLOGY": "PHARMACOLOGY",
        "POST-OPERATIVE CARE": "PERIOPERATIVE CARE",
        "RESPIRATORY": "RESPIRATORY"
    };
    
    // Desired section order
    const sectionOrder = [
        "NURSING FUNDAMENTALS",
        "FLUID, ELECTROLYTES & ACID-BASE",
        "IMMUNE SYSTEM & HEMATOLOGY",
        "RESPIRATORY",
        "GASTROINTESTINAL & HEPATIC",
        "NEUROLOGICAL",
        "SENSORY: EYES & VISION",
        "PAIN MANAGEMENT",
        "PHARMACOLOGY",
        "ONCOLOGY",
        "NUTRITION",
        "PERIOPERATIVE CARE"
    ];
    
    // Section icons
    const sectionIcons = {
        "NURSING FUNDAMENTALS": "📋",
        "FLUID, ELECTROLYTES & ACID-BASE": "💧",
        "IMMUNE SYSTEM & HEMATOLOGY": "🩸",
        "RESPIRATORY": "😤",
        "GASTROINTESTINAL & HEPATIC": "🍽️",
        "NEUROLOGICAL": "🧠",
        "SENSORY: EYES & VISION": "👁️",
        "PAIN MANAGEMENT": "💊",
        "PHARMACOLOGY": "💉",
        "ONCOLOGY": "🎗️",
        "NUTRITION": "🥗",
        "PERIOPERATIVE CARE": "🏥"
    };
    
    // Group questions by mapped section
    const groupedQuestions = {};
    Object.keys(qd).forEach(qid => {
        const originalSection = qd[qid].section;
        const mappedSection = sectionMapping[originalSection] || originalSection;
        if (!groupedQuestions[mappedSection]) {
            groupedQuestions[mappedSection] = [];
        }
        groupedQuestions[mappedSection].push(qid);
    });
    
    // Render questions in section order with headers
    let questionNum = 1;
    sectionOrder.forEach(section => {
        if (groupedQuestions[section] && groupedQuestions[section].length > 0) {
            const icon = sectionIcons[section] || "📚";
            const questionCount = groupedQuestions[section].length;
            displayArea.innerHTML += `
                <div class="section-header">
                    <span class="section-icon">${icon}</span>
                    <span class="section-title">${section}</span>
                    <span class="section-count">${questionCount} Questions</span>
                </div>
            `;
            
            groupedQuestions[section].forEach(qid => {
                qd[qid].displayNum = questionNum++;
                displayArea.innerHTML += generateQuestionHtml(qid, qd[qid], false);
            });
        }
    });

    attachEventListeners(false);
}

document.addEventListener('DOMContentLoaded', initQuiz);

</script>
