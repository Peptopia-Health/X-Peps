<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders — PEPTOPIA Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        /* GLOBAL SCALING - Reduces font size by ~20% and ensures mobile responsiveness */
        html { font-size: 13px; }
        @media (min-width: 768px) { html { font-size: 14px; } }

        :root {
            --bg-page: #F4F6FA; --bg-card: #FFFFFF; --bg-card-hover: #FFFFFF;
            --border-card: rgba(15, 23, 42, 0.07); --text-primary: #0F172A; 
            --text-secondary: #475569; --text-muted: #94A3B8;
            --btn-contact-bg: rgba(15, 23, 42, 0.03); --toggle-bg: #FFFFFF;
            --toggle-border: rgba(15, 23, 42, 0.10); --brand-purple: #9000F5; --pink: #FF85E1;
        }

        html.dark {
            --bg-page: #070B14; --bg-card: rgba(255, 255, 255, 0.025); --bg-card-hover: rgba(255, 255, 255, 0.05);
            --border-card: rgba(255, 255, 255, 0.07); --text-primary: #E2E8F0; 
            --text-secondary: #94A3B8; --text-muted: #64748B;
            --btn-contact-bg: rgba(255, 255, 255, 0.04); --toggle-bg: rgba(255, 255, 255, 0.06);
            --toggle-border: rgba(255, 255, 255, 0.10);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }

        /* HEADER */
        .site-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; width: 100%; }
        .header-brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .brand-mark { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--brand-purple), var(--pink)); display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.15rem; color: #fff; }
        .brand-text { display: flex; flex-direction: column; }
        .brand-name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--text-primary); letter-spacing: 2px; text-transform: uppercase; line-height: 1.1; }
        .brand-tagline { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
        .header-nav { display: flex; align-items: center; gap: 8px; }
        .nav-link { font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .nav-link:hover { color: var(--text-primary); background: var(--btn-contact-bg); }
        .nav-link.active { color: var(--brand-purple); background: rgba(144, 0, 245, 0.06); }
        
        .theme-toggle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--toggle-border); background: var(--toggle-bg); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; }
        .theme-toggle .fa-sun { display: none; }
        html.dark .theme-toggle .fa-moon { display: none; }
        html.dark .theme-toggle .fa-sun { display: inline-block; color: #FBBF24; }

        /* CONTENT */
        .hero { text-align: center; padding: 64px 24px 32px; max-width: 800px; margin: 0 auto; }
        .hero h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; font-weight: 800; margin-bottom: 16px; color: var(--text-primary); }
        .hero p { font-size: 1.15rem; color: var(--text-secondary); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 24px 64px; }
        .order-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .order-card h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin-bottom: 16px; color: var(--text-primary); }
        .order-card p { color: var(--text-secondary); margin-bottom: 32px; font-size: 1.1rem; }
        
        .btn-pay { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 32px; background: linear-gradient(135deg, #10B981, #059669); color: white; text-decoration: none; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; border-radius: 12px; transition: transform 0.3s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-pay:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="https://peptopia-health.github.io/" class="header-brand">
            <div class="brand-mark">P</div>
            <div class="brand-text">
                <span class="brand-name">Peptopia</span>
                <span class="brand-tagline">Health & Wellness</span>
            </div>
        </a>
        <nav class="header-nav">
            <a href="https://peptopia-health.github.io/" class="nav-link">Home</a>
            <a href="#" class="nav-link active">Orders</a>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
                <i class="fa-solid fa-sun"></i>
            </button>
        </nav>
    </header>

    <section class="hero">
        <h1>Secure Checkout</h1>
        <p>Complete your purchase for premium research products below.</p>
    </section>

    <main class="container">
        <div class="order-card">
            <i class="fa-solid fa-shield-check" style="font-size: 3rem; color: #10B981; margin-bottom: 24px;"></i>
            <h2>Proceed to Payment</h2>
            <p>You will be securely redirected to our GoDaddy Payments portal to complete your transaction.</p>
            <a href="https://pay.godaddy.com/" target="_blank" class="btn-pay">
                <i class="fa-solid fa-lock"></i> Pay with GoDaddy
            </a>
        </div>
    </main>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            var isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('peptopia-theme', isDark ? 'dark' : 'light');
        }
        (function() {
            if (localStorage.getItem('peptopia-theme') === 'dark') {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</body>
</html>
